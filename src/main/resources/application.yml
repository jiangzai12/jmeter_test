server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jmeter_shop?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    # ===== 性能问题 #6: 连接池过小 =====
    hikari:
      maximum-pool-size: 20 #5调大到20
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # ===== 已优化: 关闭统计和SQL日志 =====
        generate_statistics: false

# ===== 已优化: 日志级别调整 =====
logging:
  level:
    root: WARN
    com.example.shop: INFO
    org.hibernate.SQL: WARN

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
